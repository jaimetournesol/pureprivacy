<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PurePrivacy — {% block title %}Setup{% endblock %}</title>
<style>
  :root {
    --bg: #0e0f12;
    --fg: #e8e8ea;
    --muted: #9ba0aa;
    --accent: #58c0ff;
    --card: #16181d;
    --border: #2a2d34;
    --danger: #ff7878;
    --ok: #7eebab;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 32px 16px 64px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    max-width: 720px;
    width: 100%;
  }
  h1 { margin-top: 0; font-weight: 600; letter-spacing: -0.01em; }
  h2 { font-weight: 600; margin-top: 24px; }
  label { display: block; margin-top: 16px; color: var(--muted); font-size: 14px; }
  input[type=text], input[type=password] {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--fg);
    font: inherit;
    margin-top: 4px;
  }
  button, .btn {
    margin-top: 12px;
    padding: 10px 18px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: var(--bg);
    font: inherit;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
  }
  button:hover, .btn:hover { filter: brightness(1.08); }
  button.danger, .btn.danger { background: var(--danger); }
  button.ghost, .btn.ghost {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--border);
  }
  button.small, .btn.small { padding: 6px 10px; font-size: 13px; margin-top: 0; }
  code, pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 6px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  pre {
    padding: 12px;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
    margin: 0;
  }
  pre.copyable { padding-right: 64px; position: relative; }
  .copy-btn {
    position: absolute;
    top: 6px;
    right: 6px;
    margin: 0;
    padding: 2px 8px;
    font-size: 11px;
    background: var(--card);
    color: var(--accent);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    font-weight: 500;
  }
  .copy-btn:hover { filter: brightness(1.1); }
  .copy-btn.ok { color: var(--ok); border-color: var(--ok); }
  .muted { color: var(--muted); font-size: 14px; }
  .danger { color: var(--danger); }
  .qr {
    margin: 16px 0;
    padding: 16px;
    background: white;
    border-radius: 8px;
    display: inline-block;
  }
  .qr img { display: block; max-width: 280px; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; }
  .row > div { flex: 1; min-width: 280px; }
  .field { margin: 8px 0; }
  .field b { color: var(--muted); font-weight: 500; font-size: 13px; display: block; margin-bottom: 4px; }
  hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
  .topnav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 8px;
  }
  .topnav .links { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .topnav .links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 14px;
    padding: 4px 0;
  }
  .topnav .links a.active { color: var(--accent); }
  .topnav .links a:hover { color: var(--fg); }
  .topnav form { display: inline; margin: 0; }
  .topnav form button {
    margin: 0;
    padding: 4px 10px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    font-size: 13px;
    font-weight: 400;
  }
  .alert {
    margin: 12px 0;
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid var(--danger);
    background: rgba(255, 120, 120, 0.08);
  }
  .alert.info {
    border-color: var(--border);
    background: rgba(88, 192, 255, 0.06);
  }
  .person {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    flex-wrap: wrap;
  }
  .person:last-child { border-bottom: none; }
  .person .name { flex: 1; min-width: 200px; }
  .person .name b { display: block; }
  .person .name .tag {
    display: inline-block;
    margin-left: 6px;
    font-size: 11px;
    padding: 1px 6px;
    border-radius: 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .person .name .tag.admin { color: var(--accent); border-color: var(--accent); }
  .person .name .tag.deactivated { color: var(--danger); border-color: var(--danger); }
  .person .actions { display: flex; gap: 6px; }
</style>
</head>
<body>
  <div class="card">
    {% if principal is defined and principal %}
    <div class="topnav">
      <div class="links">
        <a href="/" {% if active == "home" %}class="active"{% endif %}>Home</a>
        <a href="/people" {% if active == "people" %}class="active"{% endif %}>People</a>
        <a href="/pair" {% if active == "pair" %}class="active"{% endif %}>Federation</a>
      </div>
      <form method="post" action="/logout">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <button type="submit">Log out</button>
      </form>
    </div>
    {% endif %}
    <h1>PurePrivacy</h1>
    {% block body %}{% endblock %}
  </div>
<script>
  // Attach a "copy" button to every <pre class="copyable">.  Uses
  // navigator.clipboard where available, falls back to a Selection.
  (function () {
    function attachCopy(pre) {
      var btn = document.createElement("button");
      btn.type = "button";
      btn.textContent = "copy";
      btn.className = "copy-btn";
      btn.addEventListener("click", function () {
        var txt = pre.textContent.replace(/\s+$/, "");
        var ok = function () {
          btn.textContent = "copied";
          btn.classList.add("ok");
          setTimeout(function () {
            btn.textContent = "copy";
            btn.classList.remove("ok");
          }, 1500);
        };
        if (navigator.clipboard && window.isSecureContext) {
          navigator.clipboard.writeText(txt).then(ok, function () {});
        } else {
          var sel = window.getSelection();
          var r = document.createRange();
          r.selectNodeContents(pre);
          sel.removeAllRanges();
          sel.addRange(r);
          try { document.execCommand("copy"); ok(); } catch (e) {}
          sel.removeAllRanges();
        }
      });
      pre.appendChild(btn);
    }
    document.addEventListener("DOMContentLoaded", function () {
      document.querySelectorAll("pre.copyable").forEach(attachCopy);
    });
  })();

  // Pair-code countdown.  Reads the absolute Unix timestamp from
  // [data-pair-expires], renders MM:SS, swaps in a regenerate button on zero.
  (function () {
    document.addEventListener("DOMContentLoaded", function () {
      var host = document.querySelector("[data-pair-expires]");
      if (!host) return;
      var expiresAt = parseInt(host.dataset.pairExpires, 10) * 1000;
      var span = host.querySelector(".pair-countdown");
      if (!span) return;
      function tick() {
        var ms = expiresAt - Date.now();
        if (ms <= 0) {
          host.classList.add("expired");
          span.textContent = "expired";
          var regen = host.querySelector(".pair-regen");
          if (regen) regen.style.display = "inline-block";
          return;
        }
        var s = Math.floor(ms / 1000);
        var m = Math.floor(s / 60);
        var r = s % 60;
        span.textContent = m + ":" + (r < 10 ? "0" : "") + r;
        setTimeout(tick, 500);
      }
      tick();
    });
  })();

  // Confirm-before-submit: any form with [data-confirm] prompts the operator.
  (function () {
    document.addEventListener("submit", function (e) {
      var f = e.target;
      if (!f.dataset || !f.dataset.confirm) return;
      if (!window.confirm(f.dataset.confirm)) {
        e.preventDefault();
      }
    });
  })();
</script>
</body>
</html>
