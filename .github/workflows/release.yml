name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write

jobs:
  images:
    name: Build & push images
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        component:
          - { name: init,    context: docker/init }
          - { name: tor,     context: docker/tor }
          - { name: synapse, context: docker/synapse }
          - { name: coturn,  context: docker/coturn }
          - { name: wizard,  context: wizard }
          - { name: mcp,     context: mcp-server }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/pureprivacy-${{ matrix.component.name }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.component.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: GitHub release
    runs-on: ubuntu-24.04
    needs: images
    steps:
      - uses: actions/checkout@v4

      - name: Read CHANGELOG
        id: changelog
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          # Pull the section for the current version out of CHANGELOG.md.
          awk -v ver="${tag#v}" '
            $0 ~ "^## \\["ver"\\]" { found=1; next }
            found && $0 ~ "^## \\[" { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: PurePrivacy ${{ steps.changelog.outputs.tag }}
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
